<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" fill="none">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0a0a0a"/>
            <stop offset="100%" stop-color="#1a1a1a"/>
        </linearGradient>
        <linearGradient id="logoBg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1f1f1f"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="35%" r="55%">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="1280" height="800" fill="url(#bg)"/>
    <rect width="1280" height="800" fill="url(#glow)"/>

    <g opacity="0.05" fill="#ffffff">
        <text x="100" y="280" font-family="Georgia, serif" font-size="220" font-weight="700">A</text>
        <text x="980" y="720" font-family="Helvetica, Arial, sans-serif" font-size="240" font-weight="700">a</text>
        <text x="240" y="730" font-family="Times New Roman, serif" font-size="160" font-weight="400">B</text>
        <text x="1060" y="240" font-family="Arial, sans-serif" font-size="170" font-weight="400">b</text>
    </g>

    <g transform="translate(540 180)">
        <g transform="scale(1.5625)">
            <rect width="128" height="128" rx="28" fill="url(#logoBg)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <path d="M30 102 L62 26 L94 102" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M44 74 L80 74" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" fill="none"/>
            <circle cx="104" cy="32" r="6" fill="#3b82f6"/>
        </g>
    </g>

    <text x="640" y="520" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="84" font-weight="700" fill="#ffffff" letter-spacing="-2">FontMapper</text>

    <text x="640" y="570" text-anchor="middle" font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.65)">Map any website’s fonts to your favorites — per domain, instantly.</text>

    <g transform="translate(640 670)" text-anchor="middle">
        <text font-family="-apple-system, system-ui, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.45)" letter-spacing="4">SEARCHABLE  ·  PER-DOMAIN  ·  INSTANT PREVIEW  ·  PRIVATE</text>
    </g>
</svg>
