name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build extension
              run: bun run build

            - name: Package
              run: |
                  cd dist
                  zip -r ../font-mapper-${{ github.ref_name }}.zip . -x "*.DS_Store"
                  cd ..
                  ls -lh font-mapper-${{ github.ref_name }}.zip

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: font-mapper-${{ github.ref_name }}.zip
                  generate_release_notes: true
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
